# =============================================================================
# COPY THIS FILE TO YOUR BOOK REPOSITORY
# Location: <your-book-repo>/.github/workflows/notify-bookops.yml
#
# Required setup in your book repository:
#
#   Secrets (Settings → Secrets and variables → Actions → Secrets):
#     BOOKOPS_DISPATCH_TOKEN - Token provided by BookOps admin
#                              (allows triggering extraction workflows)
#
#   Variables (Settings → Secrets and variables → Actions → Variables):
#     BOOKOPS_REPO - BookOps repository path (e.g., "owner/bookops")
#     BOOK_SLUG    - Your book's identifier (e.g., "manual-docentes-wollok")
#                    Must match the slug configured in BookOps
# =============================================================================

name: Notify BookOps of book changes

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - '**.png'
      - '**.jpg'
      - '**.jpeg'
      - '**.gif'
      - '**.svg'
      - '**.webp'
      - '**.wlk'
      - '.github/workflows/notify-bookops.yml'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger BookOps extraction
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.BOOKOPS_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ vars.BOOKOPS_REPO }}/dispatches" \
            -d '{
              "event_type": "book-updated",
              "client_payload": {
                "book_slug": "${{ vars.BOOK_SLUG }}",
                "repository": "${{ github.repository }}",
                "sha": "${{ github.sha }}",
                "ref": "${{ github.ref }}",
                "message": "${{ github.event.head_commit.message }}"
              }
            }'
          echo "✓ Triggered BookOps extraction for ${{ vars.BOOK_SLUG }} (commit ${{ github.sha }})"
